{% extends 'base.html' %}

{% block title %}تسویه حساب{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">✅ تسویه حساب</h2>

    <div class="row">
        <div class="col-md-7">
            <div class="card shadow-sm p-4">
                <h4>اطلاعات ارسال</h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>آدرس کامل</label>
                        <textarea name="address" class="form-control" rows="3" required placeholder="استان، شهر، خیابان، پلاک..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label>شماره تماس</label>
                        <input type="tel" name="phone" class="form-control" required placeholder="09xxxxxxxxx">
                    </div>
                    <button type="submit" class="btn btn-success w-100">نهایی کردن سفارش</button>
                </form>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h4>خلاصه سفارش</h4>
                <hr>
                {% for item in items %}
                    <div class="d-flex justify-content-between mb-2">
                        <span>{{ item.product.name }} ({{ item.quantity }})</span>
                        <span>{{ item.total }} تومان</span>
                    </div>
                {% endfor %}
                <hr>
                <div class="d-flex justify-content-between fw-bold">
                    <span>جمع کل:</span>
                    <span>{{ total }} تومان</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-top: 5px;
    }
    .card {
        border-radius: 16px;
        border: none;
    }
    .btn-success {
        background: linear-gradient(135deg, #28a745, #20c997);
        border: none;
        padding: 12px;
        font-size: 16px;
        border-radius: 30px;
    }
</style>
{% endblock %}
